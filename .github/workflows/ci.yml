name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate structure
        run: |
          echo "Validating documentation site structure..."
          test -f README.md && echo "README.md exists" || exit 1
          echo "Validation passed."
